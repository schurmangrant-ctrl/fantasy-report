<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friday Report - Small Ball Enthusiasts</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap');
  body { font-family: 'DM Sans', sans-serif; background: #f7f4ef; color: #1a1a1a; padding: 20px; line-height: 1.6; }
  .container { max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; border: 1.5px solid #e0dbd0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
  h1 { font-family: 'Playfair Display', serif; font-size: 32px; margin-bottom: 10px; color: #1a3d2b; }
  label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; color: #666; }
  input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1.5px solid #e0dbd0; border-radius: 8px; font-size: 16px; }
  button { width: 100%; padding: 15px; background: #1a3d2b; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: 600; }
  #report-box { display: none; margin-top: 30px; }
  .error { display: none; color: #c0392b; background: #fdecea; padding: 15px; border-radius: 8px; margin-top: 10px; font-size: 14px; border: 1px solid #f5c6c3; }
  .matchup { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #eee; }
  .standing-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f9f9f9; }
</style>
</head>
<body>

<div class="container" id="setup">
  <h1>Friday Report.</h1>
  <p style="color: #666; margin-bottom: 30px;">Generate your weekly league summary.</p>
  
  <label>ESPN League ID</label>
  <input type="text" id="leagueId" placeholder="Found in your ESPN URL">
  
  <label>Season Year</label>
  <input type="number" id="year" value="2026">

  <div id="error-box" class="error"></div>
  <button onclick="runReport()">Generate Report →</button>
</div>

<div class="container" id="report-box">
  <h1 id="r-title">Weekly Summary</h1>
  <div id="narrative" style="font-style: italic; color: #2d6a4a; margin-bottom: 25px; font-size: 18px;"></div>
  
  <h3 style="border-bottom: 2px solid #1a3d2b; padding-bottom: 5px; margin-top: 20px;">Matchups</h3>
  <div id="matchups"></div>
  
  <h3 style="border-bottom: 2px solid #1a3d2b; padding-bottom: 5px; margin-top:30px;">Standings</h3>
  <div id="standings"></div>
  
  <button style="margin-top: 30px; background: #666;" onclick="location.reload()">Reset</button>
</div>

<script>
async function runReport() {
  const id = document.getElementById('leagueId').value.trim();
  const yr = document.getElementById('year').value;
  const errBox = document.getElementById('error-box');
  
  errBox.style.display = 'none';
  
  if(!id) { showErr("Please enter a League ID."); return; }

  try {
    // API URL
    const espn = `https://fantasy.espn.com/apis/v3/games/flb/seasons/${yr}/segments/0/leagues/${id}?view=mTeam,mMatchupScore,mStandings`;
    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(espn)}`;
    
    const resp = await fetch(proxy);
    const json = await resp.json();
    const data = JSON.parse(json.contents);

    if(!data.teams) throw new Error("No team data found. Check your ID.");

    // Process Teams
    const teams = {};
    data.teams.forEach(t => {
      teams[t.id] = { name: t.name, w: t.record.overall.wins, l: t.record.overall.losses };
    });

    // Process Current Matchups
    const curWeek = data.status.currentMatchupPeriod;
    const matchupsHtml = data.schedule
      .filter(s => s.matchupPeriodId == curWeek && s.away)
      .map(m => `
        <div class="matchup">
          <span><strong>${teams[m.home.teamId].name}</strong> (${m.home.totalPoints.toFixed(1)})</span>
          <span style="color:#999">vs</span>
          <span style="text-align:right"><strong>${teams[m.away.teamId].name}</strong> (${m.away.totalPoints.toFixed(1)})</span>
        </div>
      `).join('');

    // Process Standings
    const standingsHtml = Object.values(teams)
      .sort((a,b) => b.w - a.w)
      .map((t, i) => `
        <div class="standing-row">
          <span>${i+1}. ${t.name}</span>
          <span>${t.w} - ${t.l}</span>
        </div>
      `).join('');

    // Render
    document.getElementById('setup').style.display = 'none';
    document.getElementById('report-box').style.display = 'block';
    document.getElementById('r-title').textContent = `Week ${curWeek} Summary`;
    document.getElementById('narrative').textContent = "The bats are cold, the arms are tired, and someone is inevitably complaining about a trade. Here is where the league stands.";
    document.getElementById('matchups').innerHTML = matchupsHtml || "No active matchups found for this week.";
    document.getElementById('standings').innerHTML = standingsHtml;

  } catch (e) {
    showErr("Error: " + e.message + ". Ensure your league is set to PUBLIC in ESPN Settings.");
  }
}

function showErr(msg) {
  const b = document.getElementById('error-box');
  b.textContent = msg;
  b.style.display = 'block';
}
</script>
</body>
</html>
