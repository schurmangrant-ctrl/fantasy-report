<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantasy Baseball Friday Report</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --green: #1a3d2b; --green-mid: #2d6a4a; --green-light: #e8f5ee; --gold: #c9a84c; --gold-light: #fdf6e3; --red: #c0392b; --red-light: #fdecea; --bg: #f7f4ef; --card: #ffffff; --text: #1a1a1a; --muted: #666; --border: #e0dbd0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 0; }
  #setup-screen { max-width: 560px; margin: 0 auto; padding: 60px 24px; }
  .setup-logo { font-family: 'Playfair Display', serif; font-size: 13px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--green-mid); margin-bottom: 48px; }
  .setup-headline { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 900; line-height: 1.1; color: var(--green); margin-bottom: 12px; }
  .setup-sub { font-size: 16px; color: var(--muted); line-height: 1.6; margin-bottom: 40px; }
  .field-group { margin-bottom: 20px; }
  label { display: block; font-size: 12px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  input { width: 100%; padding: 12px 16px; font-family: 'DM Mono', monospace; font-size: 15px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); outline: none; }
  .btn-primary { width: 100%; padding: 15px; background: var(--green); color: #fff; font-size: 15px; font-weight: 500; border: none; border-radius: 8px; cursor: pointer; margin-top: 8px; }
  #loading-screen { display: none; max-width: 560px; margin: 0 auto; padding: 100px 24px; text-align: center; }
  .spinner { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 24px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #error-box { display: none; margin-top: 16px; padding: 14px 16px; background: var(--red-light); border: 1px solid #f5c6c3; border-radius: 8px; font-size: 14px; color: var(--red); }
  #report-screen { display: none; }
  .report-header { background: var(--green); color: #fff; padding: 48px 40px 40px; }
  .report-title { font-family: 'Playfair Display', serif; font-size: 38px; font-weight: 900; }
  .report-body { max-width: 760px; margin: 0 auto; padding: 40px 24px 80px; }
  .narrative-card { background: var(--gold-light); border: 1.5px solid #e8d5a0; border-radius: 12px; padding: 28px 32px; margin-bottom: 32px; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--green); margin: 36px 0 16px; border-bottom: 2px solid var(--green-light); }
  .highlights-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }
  .highlight-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; padding: 18px; }
  .matchup-row { background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; padding: 14px 18px; display: grid; grid-template-columns: 1fr auto 1fr; margin-bottom: 10px; align-items: center; }
  .standings-table { width: 100%; border-collapse: collapse; }
  .standings-table td { padding: 10px; border-bottom: 1px solid var(--border); }
  .action-bar { position: sticky; bottom: 0; background: rgba(247,244,239,0.95); padding: 14px; text-align: center; border-top: 1px solid var(--border); }
  .btn-outline { padding: 10px 20px; background: white; border: 1.5px solid var(--border); border-radius: 8px; cursor: pointer; }
</style>
</head>
<body>

<div id="setup-screen">
  <div class="setup-logo">⚾ Fantasy Report Generator</div>
  <h1 class="setup-headline">Friday<br>Report.</h1>
  <p class="setup-sub">Enter your details to generate this week's breakdown.</p>
  <div class="field-group"><label>ESPN League ID</label><input type="text" id="league-id" placeholder="e.g. 12345678" /></div>
  <div class="field-group"><label>Season Year</label><input type="number" id="season-year" value="2026" /></div>
  <div class="field-group"><label>Week Number</label><input type="text" id="week-num" placeholder="Leave blank for current" /></div>
  <div id="error-box"></div>
  <button class="btn-primary" onclick="generateReport()">Generate Report →</button>
</div>

<div id="loading-screen"><div class="spinner"></div><div class="loading-label">Fetching data via proxy...</div></div>

<div id="report-screen">
  <div class="report-header"><div class="report-title">The Friday Report</div><div id="report-league-name"></div></div>
  <div class="report-body">
    <div class="narrative-card"><div id="narrative-text"></div></div>
    <div class="section-title">🏆 Highlights</div><div class="highlights-grid" id="highlights-grid"></div>
    <div class="section-title">⚔️ Matchups</div><div id="matchup-list"></div>
    <div class="section-title">📊 Standings</div><div id="standings-container"></div>
  </div>
  <div class="action-bar"><button class="btn-outline" onclick="location.reload()">← New Report</button></div>
</div>

<script>
async function generateReport() {
  const leagueId = document.getElementById('league-id').value.trim();
  const year = document.getElementById('season-year').value.trim();
  const weekInput = document.getElementById('week-num').value.trim();

  if (!leagueId) { showError('Enter League ID'); return; }

  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('loading-screen').style.display = 'block';

  try {
    const views = 'mTeam,mMatchupScore,mStandings,mRoster,mSettings';
    const weekParam = weekInput ? `&scoringPeriodId=${weekInput}&matchupPeriodId=${weekInput}` : '';
    const espnUrl = `https://fantasy.espn.com/apis/v3/games/flb/seasons/${year}/segments/0/leagues/${leagueId}?view=${views}${weekParam}`;
    
    // USING ALLORIGINS PROXY TO BYPASS CORS
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(espnUrl)}`;
    
    const resp = await fetch(proxyUrl);
    const proxyData = await resp.json();
    const data = JSON.parse(proxyData.contents);

    const processed = processData(data, weekInput);
    render(processed);

    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('report-screen').style.display = 'block';
  } catch (e) {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('setup-screen').style.display = 'block';
    showError("League is Private or ID is wrong. Make sure it's PUBLIC in ESPN Settings.");
  }
}

function processData(data, weekInput) {
  const teams = data.teams;
  const members = data.members;
  const week = weekInput || data.status.currentMatchupPeriod;
  const teamMap = {};
  teams.forEach(t => {
    const m = members.find(mem => mem.id === t.primaryOwner);
    teamMap[t.id] = { name: t.name, owner: m ? m.firstName : 'Owner', wins: t.record.overall.wins, pts: t.record.overall.pointsFor };
  });

  const matchups = data.schedule.filter(s => s.matchupPeriodId == week && s.away).map(m => ({
    hT: teamMap[m.home.teamId].name, hS: m.home.totalPoints.toFixed(1),
    aT: teamMap[m.away.teamId].name, aS: m.away.totalPoints.toFixed(1),
    margin: Math.abs(m.home.totalPoints - m.away.totalPoints).toFixed(1)
  }));

  const standings = Object.values(teamMap).sort((a,b) => b.wins - a.wins || b.pts - a.pts);
  
  return { leagueName: "Fantasy Baseball", week, matchups, standings };
}

function render(d) {
  document.getElementById('report-league-name').textContent = `Week ${d.week} Report`;
  document.getElementById('narrative-text').innerHTML = `<strong>The stats are in.</strong> This week saw some absolute battles and some truly questionable managing. Check the scores below.`;
  
  document.getElementById('matchup-list').innerHTML = d.matchups.map(m => `
    <div class="matchup-row">
      <div><strong>${m.hT}</strong><br>${m.hS}</div>
      <div style="font-size:11px; color:#888">vs<br>Δ${m.margin}</div>
      <div style="text-align:right"><strong>${m.aT}</strong><br>${m.aS}</div>
    </div>`).join('');

  document.getElementById('standings-container').innerHTML = `<table class="standings-table">
    ${d.standings.map((t,i) => `<tr><td>${i+1}</td><td>${t.name}</td><td>${t.wins} Wins</td></tr>`).join('')}
  </table>`;
}

function showError(m) {
  const eb = document.getElementById('error-box');
  eb.style.display = 'block';
  eb.textContent = '⚠️ ' + m;
}
</script>
</body>
</html>
