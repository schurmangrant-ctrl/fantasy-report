<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantasy Baseball Friday Report</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1a3d2b;
    --green-mid: #2d6a4a;
    --green-light: #e8f5ee;
    --gold: #c9a84c;
    --gold-light: #fdf6e3;
    --red: #c0392b;
    --red-light: #fdecea;
    --bg: #f7f4ef;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #666;
    --border: #e0dbd0;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* SETUP SCREEN */
  #setup-screen {
    max-width: 560px;
    margin: 0 auto;
    padding: 60px 24px;
  }

  .setup-logo {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--green-mid);
    margin-bottom: 48px;
  }

  .setup-headline {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 900;
    line-height: 1.1;
    color: var(--green);
    margin-bottom: 12px;
  }

  .setup-sub {
    font-size: 16px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 40px;
  }

  .field-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  input[type="text"], input[type="number"], select {
    width: 100%;
    padding: 12px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus { border-color: var(--green-mid); }

  .help-text {
    font-size: 12px;
    color: var(--muted);
    margin-top: 5px;
    line-height: 1.5;
  }

  .btn-primary {
    width: 100%;
    padding: 15px;
    background: var(--green);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.04em;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-primary:hover { background: var(--green-mid); }
  .btn-primary:active { transform: scale(0.99); }

  .how-it-works {
    margin-top: 40px;
    padding: 20px;
    background: var(--green-light);
    border-radius: 10px;
    border-left: 3px solid var(--green-mid);
  }
  .how-it-works h3 {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    color: var(--green);
    margin-bottom: 10px;
  }
  .how-it-works ol {
    font-size: 13px;
    color: var(--green-mid);
    padding-left: 18px;
    line-height: 2;
  }

  /* LOADING */
  #loading-screen {
    display: none;
    max-width: 560px;
    margin: 0 auto;
    padding: 100px 24px;
    text-align: center;
  }

  .spinner {
    width: 48px;
    height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 24px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-label {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--green);
    margin-bottom: 8px;
  }

  /* ERROR */
  #error-box {
    display: none;
    margin-top: 16px;
    padding: 14px 16px;
    background: var(--red-light);
    border: 1px solid #f5c6c3;
    border-radius: 8px;
    font-size: 14px;
    color: var(--red);
    line-height: 1.5;
  }

  /* REPORT SCREEN */
  #report-screen {
    display: none;
  }

  .report-header {
    background: var(--green);
    color: #fff;
    padding: 48px 40px 40px;
    position: relative;
    overflow: hidden;
  }
  .report-header::after {
    content: '⚾';
    position: absolute;
    right: 40px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 100px;
    opacity: 0.07;
  }
  .report-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
  }
  .report-title {
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 6px;
  }
  .report-league {
    font-size: 15px;
    opacity: 0.7;
  }

  .report-body {
    max-width: 760px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* NARRATIVE CARD */
  .narrative-card {
    background: var(--gold-light);
    border: 1.5px solid #e8d5a0;
    border-radius: 12px;
    padding: 28px 32px;
    margin-bottom: 32px;
    position: relative;
  }
