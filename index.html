<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Small Ball Enthusiasts Report</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap');
  body { font-family: 'DM Sans', sans-serif; background: #f7f4ef; color: #1a1a1a; padding: 20px; }
  .container { max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; border: 1.5px solid #e0dbd0; }
  h1 { font-family: 'Playfair Display', serif; color: #1a3d2b; }
  input { width: 100%; padding: 12px; margin: 10px 0 20px; border: 1.5px solid #e0dbd0; border-radius: 8px; }
  button { width: 100%; padding: 15px; background: #1a3d2b; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
  .error-msg { display: none; color: #c0392b; background: #fdecea; padding: 15px; border-radius: 8px; margin: 10px 0; border: 1px solid #f5c6c3; font-size: 13px; }
  .matchup-card { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
  #report-view { display: none; }
</style>
</head>
<body>

<div class="container" id="setup-view">
  <h1>Friday Report.</h1>
  <p style="color:#666; margin-bottom:20px;">Small Ball Enthusiasts Weekly Breakdown</p>
  
  <label style="font-size:12px; font-weight:600; color:#666;">LEAGUE ID</label>
  <input type="text" id="lId" placeholder="Enter ID from URL">
  
  <label style="font-size:12px; font-weight:600; color:#666;">YEAR</label>
  <input type="number" id="lYr" value="2026">

  <div id="err" class="error-msg"></div>
  <button onclick="build()">Generate Report</button>
</div>

<div class="container" id="report-view">
  <h1 id="header-week">Week X Summary</h1>
  <div id="narrative" style="margin: 20px 0; font-style: italic; color: #2d6a4a;"></div>
  <div id="matchup-list"></div>
  <button style="margin-top:20px; background:#666;" onclick="location.reload()">Back</button>
</div>

<script>
async function build() {
  const id = document.getElementById('lId').value.trim();
  const yr = document.getElementById('lYr').value;
  const eBox = document.getElementById('err');
  eBox.style.display = 'none';

  if(!id) { eBox.textContent = "Please enter your League ID."; eBox.style.display = 'block'; return; }

  try {
    const espn = `https://fantasy.espn.com/apis/v3/games/flb/seasons/${yr}/segments/0/leagues/${id}?view=mTeam,mMatchupScore,mStandings`;
    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(espn)}`;
    
    const r = await fetch(proxy);
    const j = await r.json();
    
    // THE FIX: Check if the proxy returned a string or an object
    let data = typeof j.contents === 'string' ? JSON.parse(j.contents) : j.contents;

    if(!data || !data.teams) throw new Error("Could not find teams. Check League ID.");

    const teams = {};
    data.teams.forEach(t => { teams[t.id] = t.name; });

    const week = data.status.currentMatchupPeriod;
    const mHtml = data.schedule
      .filter(s => s.matchupPeriodId == week && s.away)
      .map(m => `
        <div class="matchup-card">
          <span><strong>${teams[m.home.teamId]}</strong>: ${m.home.totalPoints.toFixed(1)}</span>
          <span><strong>${teams[m.away.teamId]}</strong>: ${m.away.totalPoints.toFixed(1)}</span>
        </div>
      `).join('');

    document.getElementById('setup-view').style.display = 'none';
    document.getElementById('report-view').style.display = 'block';
    document.getElementById('header-week').textContent = `Week ${week} Summary`;
    document.getElementById('narrative').textContent = "Another week of Small Ball Enthusiasts action. Here's the damage:";
    document.getElementById('matchup-list').innerHTML = mHtml || "No stats found for this week yet.";

  } catch (err) {
    console.error(err);
    eBox.textContent = "Error: " + err.message + ". Double check your League ID.";
    eBox.style.display = 'block';
  }
}
</script>
</body>
</html>
