<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Small Ball Enthusiasts - Friday Report</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap');
  body { font-family: 'DM Sans', sans-serif; background: #f7f4ef; color: #1a1a1a; padding: 20px; }
  .container { max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; border: 1.5px solid #e0dbd0; }
  h1 { font-family: 'Playfair Display', serif; color: #1a3d2b; }
  textarea { width: 100%; height: 150px; padding: 12px; margin: 10px 0; border: 1.5px solid #e0dbd0; border-radius: 8px; font-size: 14px; }
  button { width: 100%; padding: 15px; background: #1a3d2b; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
  .matchup-card { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
  #report-view { display: none; }
  .score-badge { background: #f0f0f0; padding: 4px 10px; border-radius: 4px; font-family: monospace; font-weight: bold; }
</style>
</head>
<body>

<div class="container" id="setup-view">
  <h1>Friday Report.</h1>
  <p style="color:#666; margin-bottom:20px;">The "Copy-Paste" Method (No Tech Issues)</p>
  
  <p style="font-size: 14px; color: #444;">1. Open your <strong>ESPN Scoreboard</strong> page.<br>
  2. Use your mouse to <strong>highlight all the matchups</strong> (names and scores).<br>
  3. Copy (Ctrl+C) and paste that text below:</p>
  
  <textarea id="raw-text" placeholder="Paste your scoreboard text here..."></textarea>
  <button onclick="processText()">Generate Week 1 Report →</button>
</div>

<div class="container" id="report-view">
  <h1 id="header-week">Week 1 Summary</h1>
  <div id="narrative" style="margin: 20px 0; font-style: italic; color: #2d6a4a; font-size: 18px;"></div>
  <div id="matchup-list"></div>
  <button style="margin-top:20px; background:#666;" onclick="location.reload()">Reset</button>
</div>

<script>
  function processText() {
    const text = document.getElementById('raw-text').value;
    const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    
    // This is a "Fuzzy Matcher" that looks for numbers (scores) near team names
    let matchups = [];
    for(let i = 0; i < lines.length; i++) {
        // If we see "vs", the line above is Team A and below is Team B
        if(lines[i].toLowerCase() === 'vs' || lines[i].includes(' - ')) {
            let team1 = lines[i-1] || "Team 1";
            let team2 = lines[i+1] || "Team 2";
            matchups.push({ t1: team1, t2: team2 });
        }
    }

    if(matchups.length === 0) {
        alert("I couldn't find the matchups. Try highlighting a larger chunk of the page!");
        return;
    }

    document.getElementById('setup-view').style.display = 'none';
    document.getElementById('report-view').style.display = 'block';
    document.getElementById('narrative').textContent = "The Small Ball Enthusiasts have officially taken the field. Week 1 is in full swing.";
    
    document.getElementById('matchup-list').innerHTML = matchups.map(m => `
        <div class="matchup-card">
            <span><strong>${m.t1}</strong></span>
            <span class="score-badge">LIVE</span>
            <span style="text-align:right"><strong>${m.t2}</strong></span>
        </div>
    `).join('');
  }
</script>
</body>
</html>
